spring.application.name=NovaLedger
server.port=8111

# === MySQL ===
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/fin_core?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === HikariCP Connection Pool ===
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# === JPA ===
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# === Flyway ===
spring.flyway.clean-disabled=true

# === Thymeleaf ===
spring.thymeleaf.cache=true

# === DevTools ===
spring.devtools.restart.enabled=false

# === Multipart ===
# 注意：上傳大小上限的業務設定已移入 system_configs.import.max.file.size.mb
# 此處保留 Spring 層的硬上限（防止超大請求進入應用程式）
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# === JWT（啟動時必要，不可移入 DB）===
jwt.secret=${JWT_SECRET:R7kQ9Z2fM6PA8XWmThE4LcJdVYB3S0nU5aKx1bNpQeR}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# === Redis（啟動時必要，不可移入 DB）===
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=2000
spring.data.redis.database=0

# === Swagger ===
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# === Mail (Gmail SMTP) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:novaledger.noreply@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# === App Base URL ===
app.base-url=${APP_BASE_URL:http://localhost:8111}

# === Log ===
logging.level.root=INFO
logging.level.com.example.novaledger=INFO

# ============================================================
# 以下設定已移入 DB system_configs 表，由 SystemConfigService 讀取
# 不再從 properties 讀取：
#   app.auth.skip-email-verify       → system_configs: email.verify.enabled
#   app.auth.verify-token-expire-minutes → system_configs: auth.token.expire.minutes
#   app.auth.resend-cooldown-seconds → system_configs: auth.resend.cooldown.seconds
# ============================================================
