# ============================================================
# Dev \u74B0\u5883\u8A2D\u5B9A
# \u53EA\u5BEB\u8DDF application.properties \u4E0D\u540C\u7684\u90E8\u5206
# ============================================================

# === MySQL\uFF08\u672C\u6A5F\u56FA\u5B9A\u8A2D\u5B9A\uFF09===
spring.datasource.url=jdbc:mysql://localhost:3306/fin_core?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456

# === Flyway\uFF08dev \u5141\u8A31 clean\uFF0C\u65B9\u4FBF\u91CD\u8DD1 migration\uFF09===
spring.flyway.clean-disabled=false

# === Thymeleaf\uFF08dev \u95DC cache\uFF0C\u4FEE\u6539 template \u7ACB\u5373\u751F\u6548\uFF09===
spring.thymeleaf.cache=false

# === DevTools\uFF08dev \u958B\u555F\u71B1\u91CD\u8F09\uFF09===
spring.devtools.restart.enabled=true

# === Swagger\uFF08dev \u958B\u555F\uFF09===
springdoc.swagger-ui.enabled=true

# === Log\uFF08dev \u8A73\u7D30\uFF09===
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.com.example.novaledger=DEBUG
logging.level.org.springframework.security=DEBUG

# === JWT\uFF08dev \u56FA\u5B9A\u503C\uFF0C\u4E0D\u4F9D\u8CF4\u74B0\u5883\u8B8A\u6578\uFF09===
jwt.secret=NovaLedgerDevSecretKeyForJWTHS256Algorithm2026
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# === Mail\uFF08dev \u56FA\u5B9A\u503C\uFF09===
# application-dev.properties\uFF08\u9032 git\uFF09
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}

