<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Login</title>

    <link rel="icon" type="image/svg+xml" th:href="@{/images/novaledger-favicon-Growth.svg}"/>

    <link href="/css/styles.css" rel="stylesheet" />
    <link href="/css/vendor/fontawesome.all.min.css" rel="stylesheet" />
</head>

<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <div class="card-header">
                                <div class="text-center pt-4">
                                    <img th:src="@{/images/novaledger-favicon-Growth.svg}" alt="NovaLedger" width="48" height="48" class="logo-card">
                                </div>
                                <h3 class="text-center font-weight-light my-4">Login</h3>
                            </div>

                            <div class="card-body">

                                <div th:if="${param.logout}" class="alert alert-success">
                                    已成功登出
                                </div>

                                <div th:if="${param.error}" class="alert alert-danger">
                                    帳號或密碼錯誤
                                </div>

                                <div id="loginError" class="alert alert-danger d-none">
                                    帳號或密碼錯誤
                                </div>

                                <form id="loginForm">
                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="email"
                                               type="email"
                                               name="username"
                                               placeholder="name@example.com"
                                               required />
                                        <label>Email address</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="password"
                                               type="password"
                                               name="password"
                                               placeholder="Password"
                                               required />
                                        <label>Password</label>
                                    </div>

                                    <!-- 快捷填入按鈕：email 放 attribute，密碼在 login.js 的 map 裡 -->
                                    <div class="mb-3 text-center">
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                data-fill-email="admin@novaledger.dev">Admin</button>
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                data-fill-email="alice@novaledger.dev">Alice</button>
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                data-fill-email="bob@novaledger.dev">Bob</button>
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                data-fill-email="son@novaledger.dev">Son</button>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a th:href="@{/page/forgot-password}" class="small">忘記密碼？</a>
                                        <button type="submit" class="btn btn-primary">Login</button>
                                    </div>
                                </form>
                            </div>

                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    <a th:href="@{/page/register}">Need an account? Sign up!</a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/vendor/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/login.js"></script>

</body>
</html>
