<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Login</title>

    <link href="/css/styles.css" rel="stylesheet" />
    <link href="/css/vendor/fontawesome.all.min.css" rel="stylesheet" />
</head>

<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <!-- Header -->
                            <div class="card-header">
                                <h3 class="text-center font-weight-light my-4">Login</h3>
                            </div>

                            <!-- Body -->
                            <div class="card-body">

                                <!-- 登出成功提示 -->
                                <div th:if="${param.logout}" class="alert alert-success">
                                    已成功登出
                                </div>

                                <!-- 登入失敗提示 -->
                                <div th:if="${param.error}" class="alert alert-danger">
                                    帳號或密碼錯誤
                                </div>

                                <!-- 登入錯誤提示（JS 控制） -->
                                <div id="loginError" class="alert alert-danger d-none">
                                    帳號或密碼錯誤
                                </div>

                                <form id="loginForm">

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="email"
                                               type="email"
                                               name="username"
                                               placeholder="name@example.com"
                                               required />
                                        <label>Email address</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="password"
                                               type="password"
                                               name="password"
                                               placeholder="Password"
                                               required />
                                        <label>Password</label>
                                    </div>

                                    <div class="mb-3 text-center">
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                        data-fill-email="admin@novaledger.dev" data-fill-password="password123">
                                        Admin
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                        data-fill-email="alice@novaledger.dev" data-fill-password="password123">
                                        Alice
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                        data-fill-email="bob@novaledger.dev" data-fill-password="password123">
                                        Bob
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                        data-fill-email="son@novaledger.dev" data-fill-password="password123">
                                        Son
                                        </button>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a th:href="@{/page/forgot-password}" class="small">忘記密碼？</a>
                                        <button type="submit" class="btn btn-primary">
                                            Login
                                        </button>
                                    </div>

                                </form>
                            </div>

                            <!-- Footer（一定在 form 外面） -->
                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    <a th:href="@{/page/register}">Need an account? Sign up!</a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="/js/vendor/bootstrap.bundle.min.js"></script>
<script src="/js/scripts.js"></script>
<script src="/js/login.js"></script>

</body>
</html>
