<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('新增信用卡', ~{::content}, ~{::pagejs})}">

<th:block th:fragment="content">
    <div class="container-fluid px-4">
        <h1 class="h3 mt-4 mb-2">新增信用卡</h1>
        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">首頁</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cards}">信用卡管理</a></li>
            <li class="breadcrumb-item active">新增信用卡</li>
        </ol>
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fas fa-plus-circle me-1"></i> 信用卡資料
                    </div>
                    <div class="card-body">
                        <form th:action="@{/cards}" th:object="${cardForm}" method="post" novalidate>
                            <div class="mb-3">
                                <label for="name" class="form-label">卡片名稱 <span class="text-danger">*</span></label>
                                <input type="text" id="name" th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                       class="form-control" placeholder="例：台新@GoGo 卡" maxlength="100"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                            </div>
                            <div class="mb-3">
                                <label for="bankCode" class="form-label">銀行代碼</label>
                                <input type="text" id="bankCode" th:field="*{bankCode}"
                                       class="form-control" placeholder="例：812" maxlength="10"/>
                            </div>
                            <div class="mb-3">
                                <label for="cardType" class="form-label">卡片類型</label>
                                <input type="text" id="cardType" th:field="*{cardType}"
                                       class="form-control" placeholder="例：VISA、Mastercard、JCB" maxlength="50"/>
                            </div>
                            <div class="mb-3">
                                <label for="cardNumberLast4" class="form-label">末四碼</label>
                                <input type="text" id="cardNumberLast4" th:field="*{cardNumberLast4}"
                                       class="form-control" placeholder="例：1234" maxlength="4"/>
                            </div>
                            <div class="mb-3">
                                <label for="currencyCode" class="form-label">幣別 <span class="text-danger">*</span></label>
                                <select id="currencyCode" th:field="*{currencyCode}"
                                        th:classappend="${#fields.hasErrors('currencyCode')} ? 'is-invalid'"
                                        class="form-select">
                                    <option value="">-- 請選擇幣別 --</option>
                                    <option value="TWD">TWD 新台幣</option>
                                    <option value="USD">USD 美元</option>
                                    <option value="JPY">JPY 日圓</option>
                                    <option value="EUR">EUR 歐元</option>
                                    <option value="CNY">CNY 人民幣</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('currencyCode')}" th:errors="*{currencyCode}"></div>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label for="billingDate" class="form-label">帳單日</label>
                                    <input type="number" id="billingDate" th:field="*{billingDate}"
                                           class="form-control" placeholder="例：25" min="1" max="31"/>
                                    <div class="form-text">每月幾號出帳單（選填）</div>
                                </div>
                                <div class="col-6 mb-3">
                                    <label for="paymentDate" class="form-label">繳款日</label>
                                    <input type="number" id="paymentDate" th:field="*{paymentDate}"
                                           class="form-control" placeholder="例：15" min="1" max="31"/>
                                    <div class="form-text">每月幾號繳款（選填）</div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="creditLimit" class="form-label">信用額度</label>
                                <div class="input-group">
                                    <input type="number" id="creditLimit" th:field="*{creditLimit}"
                                           class="form-control" placeholder="選填" min="0" step="1"/>
                                    <span class="input-group-text">元</span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="currentBalance" class="form-label">目前已使用金額 <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" id="currentBalance" th:field="*{currentBalance}"
                                           th:classappend="${#fields.hasErrors('currentBalance')} ? 'is-invalid'"
                                           class="form-control" placeholder="0" min="0" step="1"/>
                                    <span class="input-group-text">元</span>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('currentBalance')}" th:errors="*{currentBalance}"></div>
                                </div>
                                <div class="form-text">若為新申辦，請填 0。</div>
                            </div>
                            <div class="mb-4">
                                <label for="notes" class="form-label">備註</label>
                                <textarea id="notes" th:field="*{notes}" class="form-control"
                                          rows="3" maxlength="500" placeholder="選填，最多 500 字"></textarea>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/cards}" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left me-1"></i> 取消
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-1"></i> 儲存信用卡
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="pagejs"></th:block>

</html>
