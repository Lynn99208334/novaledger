<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驗證成功 - NovaLedger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(12px);
        }
        .icon {
            width: 72px;
            height: 72px;
            background: rgba(34,197,94,0.15);
            border: 2px solid rgba(34,197,94,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon svg { width: 36px; height: 36px; stroke: #22c55e; fill: none; }
        .brand { color: #f1f5f9; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 28px; opacity: 0.6; }
        h1 { color: #f1f5f9; font-size: 24px; font-weight: 600; margin-bottom: 12px; }
        p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
        .countdown { color: #22c55e; font-weight: 600; }
        .progress-bar {
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border-radius: 2px;
            animation: shrink 5s linear forwards;
        }
        @keyframes shrink { from { width: 100%; } to { width: 0%; } }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">NovaLedger</div>
        <div class="icon">
            <svg viewBox="0 0 24 24" stroke-width="2.5" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
        </div>
        <h1>Email 驗證成功</h1>
        <p>
            您的帳號已完成驗證。<br>
            將在 <span class="countdown" id="countdown">5</span> 秒後自動跳轉至登入頁面。
        </p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <a href="/page/login" class="btn">立即前往登入</a>
    </div>
    <script th:src="@{/js/verify-email-success.js}"></script>
</body>
</html>
