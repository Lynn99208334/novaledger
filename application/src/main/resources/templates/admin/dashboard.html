<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/admin-base :: layout('Admin Dashboard', ~{::content}, ~{::pagejs})}">

<th:block th:fragment="content">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between mt-4 mb-2">
            <h1 class="h3 mb-0">Admin Dashboard</h1>
            <span class="text-muted small">系統管理後台</span>
        </div>

        <!-- 系統健康指標（Day 3 實作後替換為動態資料） -->
        <div class="row mt-4">
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 me-3">
                            <i class="fas fa-clock fa-2x text-warning"></i>
                        </div>
                        <div>
                            <div class="text-muted small">PENDING 匯入任務</div>
                            <div class="fw-bold fs-5">-</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 me-3">
                            <i class="fas fa-exclamation-triangle fa-2x text-danger"></i>
                        </div>
                        <div>
                            <div class="text-muted small">近 24 小時 Error Log</div>
                            <div class="fw-bold fs-5">-</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="flex-shrink-0 me-3">
                            <i class="fas fa-database fa-2x text-success"></i>
                        </div>
                        <div>
                            <div class="text-muted small">DB 連線狀態</div>
                            <div class="fw-bold fs-5">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快速導覽 -->
        <div class="row mt-2">
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 me-3">
                                <i class="fas fa-users-cog fa-2x text-primary"></i>
                            </div>
                            <div>
                                <div class="text-muted small">使用者管理</div>
                                <a th:href="@{/page/admin/users}" class="stretched-link text-decoration-none fw-semibold">查看所有使用者</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 me-3">
                                <i class="fas fa-clipboard-list fa-2x text-info"></i>
                            </div>
                            <div>
                                <div class="text-muted small">Audit Log</div>
                                <a th:href="@{/page/admin/audit-logs}" class="stretched-link text-decoration-none fw-semibold">查看操作紀錄</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="flex-shrink-0 me-3">
                                <i class="fas fa-cogs fa-2x text-secondary"></i>
                            </div>
                            <div>
                                <div class="text-muted small">系統設定</div>
                                <a th:href="@{/page/admin/system-config}" class="stretched-link text-decoration-none fw-semibold">管理系統參數</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="pagejs"></th:block>

</html>
