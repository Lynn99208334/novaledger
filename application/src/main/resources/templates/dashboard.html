<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
          'Dashboard',
          ~{::content},
          ~{::pagejs}
      )}">

<th:block th:fragment="content">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between mt-4 mb-2">
            <h1 class="h3 mb-0">Dashboard</h1>

            <!-- Tenant Switch 下拉選單 -->
            <div class="d-flex align-items-center gap-2">
                <span class="text-muted small">目前帳本：</span>
                <select id="tenantSwitcher" class="form-select form-select-sm tenant-switcher">
                    <option value="">載入中...</option>
                </select>
            </div>
        </div>

        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item active">首頁</li>
        </ol>

        <!-- Empty State -->
        <div id="emptyState" class="text-center text-muted py-5 d-none-init">
            <i class="fas fa-wallet fa-3x mb-3"></i>
            <h5>尚未建立任何帳戶</h5>
            <p class="mb-3">新增帳戶後，Dashboard 將顯示你的資產概況。</p>
            <a href="/accounts/new" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> 新增帳戶
            </a>
        </div>

        <div id="dashboardContent">

            <!-- Row 1：三張摘要卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-xl-4 col-md-6">
                    <div class="card h-100 card-border-primary">
                        <div class="card-body">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <div class="text-xs text-uppercase text-muted fw-bold">總資產（TWD 合計）</div>
                                <i class="fas fa-coins fa-lg text-primary opacity-50"></i>
                            </div>
                            <div class="h4 mb-1 fw-bold" id="totalAssetsInTwd">—</div>
                            <div id="assetsByCurrency" class="small text-muted"></div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-4 col-md-6">
                    <div class="card h-100 card-border-success">
                        <div class="card-body">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <div class="text-xs text-uppercase text-muted fw-bold">本月收入</div>
                                <i class="fas fa-arrow-up fa-lg text-success opacity-50"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold text-success" id="monthlyIncome">—</div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-4 col-md-6">
                    <div class="card h-100 card-border-danger">
                        <div class="card-body">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <div class="text-xs text-uppercase text-muted fw-bold">本月支出</div>
                                <i class="fas fa-arrow-down fa-lg text-danger opacity-50"></i>
                            </div>
                            <div class="h4 mb-0 fw-bold text-danger" id="monthlyExpense">—</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row：逐帳戶卡片 -->
            <div class="row g-3 mb-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-wallet me-1"></i> 我的帳戶
                        </div>
                        <div class="card-body">
                            <div class="row g-3" id="accountCardsRow"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 2：四個圖表一排 -->
            <div class="row g-3 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="card h-100">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-chart-pie me-1"></i> 資產幣別佔比
                        </div>
                        <div class="card-body p-2">
                            <canvas id="currencyPieChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card h-100">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-chart-pie me-1"></i> 支出分類佔比
                        </div>
                        <div class="card-body p-2">
                            <div id="noBreakdownMsg" class="text-center text-muted py-4 d-none-init">
                                本月尚無支出記錄
                            </div>
                            <canvas id="categoryPieChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card h-100">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-chart-bar me-1"></i> 本月收支比較
                        </div>
                        <div class="card-body p-2">
                            <canvas id="incomeExpenseBarChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card h-100">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-balance-scale me-1"></i> 本月收支淨額
                        </div>
                        <div class="card-body p-2 d-flex flex-column align-items-center justify-content-center">
                            <canvas id="netBarChart"></canvas>
                            <div id="netLabel" class="mt-2 fw-bold fs-5"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Row 3：分類明細表（全寬） -->
            <div class="row g-3">
                <div class="col-12">
                    <div class="card mb-4">
                        <div class="card-header fw-semibold">
                            <i class="fas fa-list me-1"></i> 本月支出分類明細
                        </div>
                        <div class="card-body p-0">
                            <div id="noBreakdownTable" class="text-center text-muted py-4 d-none-init">
                                本月尚無支出記錄
                            </div>

                            <table class="table table-hover mb-0 d-none-init" id="breakdownTable">
                                <thead class="table-light">
                                <tr>
                                    <th>分類</th>
                                    <th class="text-end">金額（TWD）</th>
                                    <th class="text-end">佔比</th>
                                </tr>
                                </thead>
                                <tbody id="breakdownTableBody"></tbody>
                                <tfoot class="table-light fw-bold">
                                <tr>
                                    <td>合計</td>
                                    <td class="text-end" id="breakdownTotal">—</td>
                                    <td class="text-end">100%</td>
                                </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /dashboardContent -->
    </div>
</th:block>

<th:block th:fragment="pagejs">
    <script th:src="@{/js/vendor/chart.umd.min.js}"></script>
    <script th:src="@{/js/vendor/chartjs-plugin-datalabels.min.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</th:block>

</html>
