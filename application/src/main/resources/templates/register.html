<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Register - NovaLedger</title>

    <link rel="icon" type="image/svg+xml" th:href="@{/images/novaledger-favicon-Growth.svg}"/>

    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <link th:href="@{/css/vendor/fontawesome.all.min.css}" rel="stylesheet" />
</head>

<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <div class="card-header">
                                <div class="text-center pt-4">
                                    <img th:src="@{/images/novaledger-favicon-Growth.svg}" alt="NovaLedger" width="48" height="48" class="logo-card">
                                </div>
                                <h3 class="text-center font-weight-light my-4">建立帳號</h3>
                            </div>

                            <div class="card-body">

                                <div id="registerError" class="alert alert-danger d-none"></div>
                                <div id="registerSuccess" class="alert alert-success d-none"></div>

                                <form id="registerForm">
                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="username"
                                               type="text"
                                               placeholder="Username"
                                               required />
                                        <label>使用者名稱</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="email"
                                               type="email"
                                               placeholder="name@example.com"
                                               required />
                                        <label>Email</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="password"
                                               type="password"
                                               placeholder="Password"
                                               required />
                                        <label>密碼</label>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a th:href="@{/page/login}" class="small">已有帳號？登入</a>
                                        <button type="submit" class="btn btn-primary" id="submitBtn">建立帳號</button>
                                    </div>
                                </form>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/vendor/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/scripts.js}"></script>
<script th:src="@{/js/register.js}"></script>

</body>
</html>
