<!DOCTYPE html>
<html lang="zh-Hant"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <title>Fragments</title>
</head>
<body>

<!-- ── Vendor CSS（放進 <head> 用） ───────────────────────── -->
<th:block th:fragment="vendor-css">
    <link rel="stylesheet" href="/css/vendor/sweetalert2.v11.10.6.min.css"/>
</th:block>

<!-- ── Top Navbar（Member）───────────────────────────────────── -->
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark"
     th:fragment="topnav">

    <a class="navbar-brand ps-3 d-flex align-items-center gap-2" th:href="@{/page/dashboard}">
        <img th:src="@{/images/novaledger-favicon-Growth.svg}" alt="NovaLedger" width="28" height="28" class="navbar-logo">
        NovaLedger
    </a>

    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
            id="sidebarToggle"
            aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0"
          role="search">
        <div class="input-group">
            <input class="form-control" type="text" placeholder="Search for..." aria-label="Search"/>
            <button class="btn btn-primary" type="button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </form>

    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">

        <li class="nav-item dropdown d-none-init" id="userDropdownItem">
            <a class="nav-link dropdown-toggle"
               id="navbarDropdown" href="#" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-user fa-fw me-1"></i>
                <span id="navUsername"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li class="dropdown-item-text small text-muted">
                    登入身分：<strong id="navUsernameDetail"></strong>
                </li>
                <li class="dropdown-item-text small text-muted" id="navTokenExpiry"></li>
                <li><hr class="dropdown-divider"/></li>
                <li>
                    <button type="button" class="dropdown-item d-flex align-items-center" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </button>
                </li>
            </ul>
        </li>

        <li class="nav-item d-none-init" id="loginLinkItem">
            <a class="nav-link" href="/page/login">
                <i class="fas fa-sign-in-alt me-1"></i> Login
            </a>
        </li>
    </ul>
</nav>

<!-- ── Top Navbar（Admin）────────────────────────────────────── -->
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark"
     th:fragment="topnav-admin">

    <a class="navbar-brand ps-3 d-flex align-items-center gap-2" th:href="@{/page/admin/dashboard}">
        <img th:src="@{/images/novaledger-favicon-Growth.svg}" alt="NovaLedger" width="28" height="28" class="navbar-logo">
        NovaLedger <span class="badge bg-danger ms-1 small">Admin</span>
    </a>

    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
            id="sidebarToggle"
            aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <!-- 撐開空間，讓 user dropdown 靠右 -->
    <div class="ms-auto"></div>

    <ul class="navbar-nav me-3 me-lg-4">
        <li class="nav-item dropdown d-none-init" id="userDropdownItem">
            <a class="nav-link dropdown-toggle"
               id="navbarDropdown" href="#" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-user-shield fa-fw me-1"></i>
                <span id="navUsername"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li class="dropdown-item-text small text-muted">
                    登入身分：<strong id="navUsernameDetail"></strong>
                </li>
                <li class="dropdown-item-text small text-muted" id="navTokenExpiry"></li>
                <li><hr class="dropdown-divider"/></li>
                <li>
                    <button type="button" class="dropdown-item d-flex align-items-center" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </button>
                </li>
            </ul>
        </li>
    </ul>
</nav>


<!-- ── Side Navbar (Sidenav) ───────────────────────────────── -->
<nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion" th:fragment="sidenav">
    <div class="sb-sidenav-menu">
        <div class="nav">
            <th:block th:each="section : ${menuSections}">
                <div class="sb-sidenav-menu-heading" th:text="${section.key}"></div>
                <a class="nav-link" th:each="item : ${section.value}" th:href="@{${item.url}}">
                    <div class="sb-nav-link-icon"><i th:class="${item.icon}"></i></div>
                    <span th:text="${item.label}"></span>
                </a>
            </th:block>
        </div>
    </div>
    <div class="sb-sidenav-footer">
        <div class="small">Logged in as:</div>
        <span sec:authentication="name">User</span>
    </div>
</nav>


<!-- ── Vendor JS（放在 </body> 前用） ─────────────────────── -->
<th:block th:fragment="vendor-js">
    <script defer src="/js/vendor/sweetalert2.all.v11.10.6.min.js"></script>
    <script src="/js/navbar.js"></script>
</th:block>

</body>
</html>
