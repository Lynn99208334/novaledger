<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>忘記密碼 - NovaLedger</title>
    <link href="/css/styles.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/vendor/all.min.css}" />
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <div class="card-header">
                                <h3 class="text-center font-weight-light my-4">忘記密碼</h3>
                            </div>

                            <div class="card-body">
                                <p class="text-muted small text-center mb-4">
                                    請輸入您的 Email，我們將寄送重設密碼連結給您。
                                </p>

                                <div id="successMsg" class="alert alert-success d-none">
                                    若此 Email 已註冊，重設連結已寄出，請查收信箱。
                                </div>

                                <div id="errorMsg" class="alert alert-danger d-none">
                                    發生錯誤，請稍後再試。
                                </div>

                                <form id="forgotForm">
                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="email"
                                               type="email"
                                               placeholder="name@example.com"
                                               required />
                                        <label>Email address</label>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a th:href="@{/page/login}" class="small">返回登入</a>
                                        <button type="submit" class="btn btn-primary" id="submitBtn">
                                            寄送重設連結
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    <a th:href="@{/page/register}">還沒有帳號？立即註冊</a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/vendor/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/scripts.js}"></script>
<script th:src="@{/js/forgot-password.js}"></script>
</body>
</html>
