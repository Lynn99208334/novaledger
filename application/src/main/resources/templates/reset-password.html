<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>重設密碼 - NovaLedger</title>
    <link href="/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <div class="card-header">
                                <h3 class="text-center font-weight-light my-4">重設密碼</h3>
                            </div>

                            <div class="card-body">

                                <div id="invalidTokenMsg" class="alert alert-danger d-none">
                                    連結無效或已過期，請重新申請。
                                </div>

                                <div id="successMsg" class="alert alert-success d-none">
                                    密碼已重設成功！3 秒後跳轉至登入頁面...
                                </div>

                                <div id="errorMsg" class="alert alert-danger d-none">
                                    發生錯誤，請稍後再試。
                                </div>

                                <form id="resetForm">
                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="newPassword"
                                               type="password"
                                               placeholder="新密碼"
                                               required
                                               minlength="8" />
                                        <label>新密碼（最少 8 個字元）</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="confirmPassword"
                                               type="password"
                                               placeholder="確認新密碼"
                                               required />
                                        <label>確認新密碼</label>
                                    </div>

                                    <div id="passwordMismatch" class="text-danger small d-none mb-2">
                                        兩次輸入的密碼不一致
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a href="/page/forgot-password" class="small">重新申請連結</a>
                                        <button type="submit" class="btn btn-primary" id="submitBtn">
                                            確認重設
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    <a href="/page/login">返回登入</a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/js/scripts.js"></script>
<style>
    .card-footer { position: relative; z-index: 999; }
    .card-footer a { pointer-events: auto !important; }
</style>
<script>
    // 從 URL 取得 token
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    if (!token) {
        document.getElementById("invalidTokenMsg").classList.remove("d-none");
        document.getElementById("resetForm").classList.add("d-none");
    }

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const successMsg = document.getElementById("successMsg");
        const errorMsg = document.getElementById("errorMsg");
        const passwordMismatch = document.getElementById("passwordMismatch");
        const submitBtn = document.getElementById("submitBtn");

        errorMsg.classList.add("d-none");
        passwordMismatch.classList.add("d-none");

        if (newPassword !== confirmPassword) {
            passwordMismatch.classList.remove("d-none");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "重設中...";

        try {
            const response = await fetch("/api/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, newPassword })
            });

            if (!response.ok) {
                const data = await response.json();
                errorMsg.textContent = data.error?.message || "連結無效或已過期，請重新申請。";
                errorMsg.classList.remove("d-none");
                submitBtn.disabled = false;
                submitBtn.textContent = "確認重設";
                return;
            }

            successMsg.classList.remove("d-none");
            document.getElementById("resetForm").classList.add("d-none");

            setTimeout(() => {
                window.location.href = "/page/login";
            }, 3000);

        } catch (err) {
            errorMsg.textContent = "發生錯誤，請稍後再試。";
            errorMsg.classList.remove("d-none");
            submitBtn.disabled = false;
            submitBtn.textContent = "確認重設";
        }
    });
</script>
</body>
</html>
