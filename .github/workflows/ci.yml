name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 取得原始碼
      - name: Checkout source
        uses: actions/checkout@v4

      # 2️⃣ 設定 Java（符合你 Spring Boot 專案）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3️⃣ 使用 test profile 執行測試
      - name: Run tests with test profile
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn -B clean test
